[build]
  publish = "."

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/blog/"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/blog/posts/:slug"
  to = "/blog/posts/:slug/index.html"
  status = 200

[[redirects]]
  from = "/blog/posts/:slug/"
  to = "/blog/posts/:slug/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
