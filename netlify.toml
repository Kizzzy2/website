[build]
  command = "npx vite build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/lead"
  to = "/.netlify/functions/lead"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/blog/"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/blog/posts/:slug"
  to = "/blog/posts/:slug/index.html"
  status = 200

[[redirects]]
  from = "/blog/posts/:slug/"
  to = "/blog/posts/:slug/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
